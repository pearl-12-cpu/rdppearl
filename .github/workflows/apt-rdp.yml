
name: APTRDP

on:
  workflow_dispatch:

jobs:
  setup-rdp-tunnel:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Free up disk space
      shell: pwsh
      run: |
        Remove-Item -Path "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "C:\Windows\Temp\*" -Recurse -Force -ErrorAction SilentlyContinue
        Get-PSDrive C | Select-Object Used,Free

    - name: Checkout
      uses: actions/checkout@v5

    - name: Install Playit
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://github.com/playit-cloud/playit-agent/releases/download/v0.15.26/playit-windows-x86_64-signed.exe" -OutFile "$env:USERPROFILE\playit.exe"

    - name: Configure RDP
      shell: pwsh
      env:
        PASS: ${{ secrets.RDP_PASS }}
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText $env:PASS -Force)

    - name: Install Essential Tools
      shell: pwsh
      run: |
        # 7-Zip
        Invoke-WebRequest -Uri "https://www.7-zip.org/a/7z2408-x64.msi" -OutFile "$env:TEMP\7z.msi"
        Start-Process "msiexec" -ArgumentList "/i","$env:TEMP\7z.msi","/quiet","/norestart" -Wait

        # VLC Portable
        Invoke-WebRequest -Uri "https://download.videolan.org/pub/vlc/3.0.21/win64/vlc-3.0.21-win64.7z" -OutFile "$env:TEMP\vlc.7z"
        & "C:\Program Files\7-Zip\7z.exe" x "$env:TEMP\vlc.7z" -o"C:\Program Files\VLC" -y -bso0

        # Firefox
        Invoke-WebRequest -Uri "https://download.mozilla.org/?product=firefox-latest&os=win64&lang=en-US" -OutFile "$env:TEMP\firefox.exe"
        Start-Process "$env:TEMP\firefox.exe" -ArgumentList "/S" -Wait

        # Lossless Cut
        Invoke-WebRequest -Uri "https://github.com/mifi/lossless-cut/releases/download/v3.67.1/LosslessCut-win-x64.7z" -OutFile "$env:TEMP\LosslessCut.7z"
        & "C:\Program Files\7-Zip\7z.exe" x "$env:TEMP\LosslessCut.7z" -o"C:\Program Files\LosslessCut" -y -bso0

        # qBittorrent
        choco install qbittorrent -y --no-progress

        Write-Host "All tools installed successfully!"

    - name: Install Media Tools (yt-dlp + ffmpeg)
      shell: pwsh
      run: |
        # yt-dlp
        Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "C:\Windows\System32\yt-dlp.exe"

        # ffmpeg
        $fftmp = "$env:TEMP\ff"; mkdir $fftmp -Force >$null;
        Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-full.7z" -OutFile "$fftmp\ff.7z";
        & "C:\Program Files\7-Zip\7z.exe" x "$fftmp\ff.7z" -o"$fftmp" -y;
        Copy-Item "$fftmp\ffmpeg-*\bin\*.exe" "C:\Windows\System32\" -Force

    - name: Create Desktop Shortcuts
      shell: pwsh
      run: |
        $WshShell = New-Object -comObject WScript.Shell

        $apps = @{
          "Lossless Cut" = "C:\Program Files\LosslessCut\LosslessCut.exe"
          "VLC Player" = "C:\Program Files\VLC\vlc.exe"
          "Firefox" = "C:\Program Files\Mozilla Firefox\firefox.exe"
          "qBittorrent" = "C:\Program Files\qBittorrent\qbittorrent.exe"
        }

        foreach ($name in $apps.Keys) {
          $sc = $WshShell.CreateShortcut("$env:USERPROFILE\Desktop\$name.lnk")
          $sc.TargetPath = $apps[$name]
          $sc.WorkingDirectory = (Split-Path $apps[$name])
          $sc.Save()
        }

    - name: Create Download Script
      shell: pwsh
      run: |
        $downloadScript = @'
        @echo off
        chcp 65001 >nul
        echo ===============================
        echo    YouTube Download Script
        echo ===============================
        echo.
        if "%~1"=="" (
            set /p "url=Enter YouTube URL: "
        ) else (
            set "url=%~1"
        )
        echo Downloading: %url%
        yt-dlp -N 8 -o "%USERPROFILE%\Downloads\%(title)s-%(height)sp.%(ext)s" "%url%"
        if %errorlevel% equ 0 (
            echo Download completed successfully!
        ) else (
            echo Download failed with error code %errorlevel%
        )
        pause
        '@
        $downloadScript | Out-File -FilePath "$env:USERPROFILE\Desktop\Download.bat" -Encoding ASCII

    - name: Show tunnel address
      shell: pwsh
      env:
        PLAYIT_AUTH_KEY: ${{ secrets.PL }}
      run: |
        # Start playit, capture address, kill background process
        $proc = Start-Process "$env:USERPROFILE\playit.exe" -ArgumentList "--secret",$env:PLAYIT_AUTH_KEY -NoNewWindow -PassThru -RedirectStandardOutput "$env:TEMP\playit.log"
        
        $addr = $null
        for ($i=0; $i -lt 60; $i++) {
          Start-Sleep 1
          if (Test-Path "$env:TEMP\playit.log") {
            $line = Get-Content "$env:TEMP\playit.log" -Raw -ErrorAction SilentlyContinue | Select-String -Pattern "https://([\w\-\.]+\.ply\.gg:\d+)" | Select-Object -First 1
            if ($line) {
              $addr = $line.Matches.Groups[1].Value
              Write-Host "`n>>> RDP ADDRESS: $addr <<<`n"
              break
            }
          }
        }
        
        # Cleanup: stop playit to free disk, will restart in next step
        Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
        Remove-Item "$env:TEMP\playit.log" -Force -ErrorAction SilentlyContinue
        
        if (-not $addr) {
          Write-Host "no tunnel URL found"
          exit 1
        }

    - name: Relaunch playit tunnel (background)
      shell: pwsh
      env:
        PLAYIT_AUTH_KEY: ${{ secrets.PL }}
      run: |
        Start-Process "$env:USERPROFILE\playit.exe" -ArgumentList "--secret",$env:PLAYIT_AUTH_KEY -NoNewWindow

    - name: Keep runner alive
      shell: pwsh
      run: Start-Sleep 21600
